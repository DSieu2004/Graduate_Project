amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"

    scan_topic: /scan

    set_initial_pose: true

    transform_tolerance: 1.0

    update_min_d: 0.05
    update_min_a: 0.1
    resample_interval: 1


bt_navigator:
  ros__parameters:
    use_sim_time: false

    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom

    transform_tolerance: 1.0


controller_server:
  ros__parameters:
    use_sim_time: false

    controller_frequency: 20.0
    transform_tolerance: 1.0

    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      debug_trajectory_details: false

      sim_time: 1.7
      vx_samples: 20
      vtheta_samples: 40

      path_distance_bias: 32.0
      goal_distance_bias: 24.0
      occdist_scale: 0.02
      rotate_to_goal_scale: 32.0

      min_vel_x: 0.0
      max_vel_x: 0.35
      max_vel_theta: 1.2

      min_speed_xy: 0.0
      min_speed_theta: 0.0

      acc_lim_x: 0.5
      acc_lim_theta: 1.2

      decel_lim_x: -0.5
      decel_lim_theta: -1.2

      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.15


planner_server:
  ros__parameters:
    use_sim_time: false

    expected_planner_frequency: 5.0

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"

      tolerance: 0.5
      allow_unknown: true

      max_iterations: 100000
      max_on_approach_iterations: 1000


map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""


global_costmap:
  global_costmap:
    ros__parameters:

      global_frame: map
      robot_base_frame: base_link

      update_frequency: 5.0
      publish_frequency: 5.0

      resolution: 0.05

      footprint: "[[0.14,0.155],[0.14,-0.155],[-0.14,-0.155],[-0.14,0.155]]"

      transform_tolerance: 1.0

      plugins: ["static_layer","obstacle_layer","inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"

        observation_sources: scan

        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          obstacle_range: 3.0
          raytrace_range: 3.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"

        inflation_radius: 0.45
        cost_scaling_factor: 2.5


local_costmap:
  local_costmap:
    ros__parameters:

      global_frame: odom
      robot_base_frame: base_link

      update_frequency: 10.0
      publish_frequency: 10.0

      rolling_window: true

      width: 4.0
      height: 4.0

      resolution: 0.05

      footprint: "[[0.14,0.155],[0.14,-0.155],[-0.14,-0.155],[-0.14,0.155]]"

      transform_tolerance: 1.0

      plugins: ["obstacle_layer","inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"

        observation_sources: scan

        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true
          obstacle_range: 3.0
          raytrace_range: 3.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"

        inflation_radius: 0.40
        cost_scaling_factor: 2.5


lifecycle_manager_navigation:
  ros__parameters:

    use_sim_time: false

    autostart: true

    node_names:
      - map_server
      - amcl
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother